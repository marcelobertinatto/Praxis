services:
  api:
    build:
      context: .
      dockerfile: API/Praxis.API/Dockerfile
    container_name: praxis-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Redis__ConnectionString=redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: praxis-redis
    ports:
      - "6379:6379"

  redis-ui:
    image: rediscommander/redis-commander
    container_name: praxis-redis-ui
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis